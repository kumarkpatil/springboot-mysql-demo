kind: Deployment 
apiVersion: apps/v1
metadata:
    name: app-deployment
    namespace: myapp
    labels:
      app: spring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
        - name: spring-app
          image: springboot-mysql-app:1.4.0 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort:  8080
          env:
            - name:  DB_URL
              value: mysql-service
            - name:  DB_PORT
              value: "3306"
            - name:  DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MYSQL_DATABASE
            - name:  DB_USERNAME
              value: root
            - name:  DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_ROOT_PASSWORD
          resources:
            limits:
              cpu: "1"
              memory: "750Mi"
            requests:
              cpu: "0.75"
              memory: "500Mi"
          

