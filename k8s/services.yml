kind: Service
apiVersion: v1
metadata:
  name:  mysql-svc
spec:
  selector:
    app:  mysql-app
  type:  ClusterIP
  ports:
  - name:  mysql
    port:  3306
    targetPort:  3306

---

kind: Service
apiVersion: v1
metadata:
  name:  app-svc
spec:
  selector:
    app:  spring-app
  type:  ClusterIP
  ports:
  - name:  app
    port:  8080
    targetPort:  8080